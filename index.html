<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Daniel & Stephanie</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:black;
color:white;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

/* CARD */

.card{

position:absolute;

top:50%;
left:50%;

transform:translate(-50%,-50%) translateX(40px);

width:420px;
max-width:90%;

background:#111;

border-radius:20px;

padding:40px;

text-align:center;

box-shadow:0 10px 40px rgba(0,0,0,0.6);

opacity:0;
pointer-events:none;

transition:all .5s ease;

}

.card.active{

opacity:1;

transform:translate(-50%,-50%) translateX(0);

pointer-events:auto;

}

h1{
font-size:36px;
margin-bottom:10px;
}

.big{
font-size:40px;
font-weight:bold;
margin-top:10px;
}

p{
font-size:18px;
}

button{

margin-top:20px;

padding:12px 25px;

border:none;

border-radius:30px;

background:white;

color:black;

font-weight:bold;

cursor:pointer;

}

input{

padding:10px;

border-radius:8px;

border:none;

text-align:center;

margin-top:10px;

width:200px;

}

</style>

</head>

<body>

<!-- MUSICA -->

<audio id="musica" loop>
<source src="musica.mp3" type="audio/mpeg">
</audio>

<!-- LOGIN -->

<div class="card active" id="login">

<h2>Digite a senha</h2>

<input type="password" id="senha">

<br>

<button onclick="entrar()">Entrar</button>

</div>


<!-- SLIDE 1 -->

<div class="card" id="c1">

<h1>Daniel ❤️ Stephanie</h1>

<p>Nosso tempo juntos</p>

<div class="big" id="contadorCompleto"></div>

<button onclick="next()">Começar</button>

</div>


<!-- SLIDE 2 -->

<div class="card" id="c2">

<p>Estamos juntos há</p>

<div class="big" id="contadorDias"></div>

<button onclick="next()">Continuar</button>

</div>


<!-- SLIDE 3 -->

<div class="card" id="c3">

<div class="big">∞</div>

<p>Momentos incríveis juntos</p>

<button onclick="next()">Continuar</button>

</div>


<!-- SLIDE 4 -->

<div class="card" id="c4">

<p>Nossa música</p>

<p>Essa eu fiz pro nosso amor</p>

<button onclick="next()">Último</button>

</div>


<!-- FINAL -->

<div class="card" id="c5">

<h1>Stephanie ❤️</h1>

<p>Obrigado por fazer parte da minha vida desde 12/03/2021</p>

</div>


<script>

let atual = 1

function entrar(){

let senha = document.getElementById("senha").value

if(senha === "12032021"){

document.getElementById("login").classList.remove("active")
document.getElementById("c1").classList.add("active")

iniciarMusica()

}else{

alert("Senha incorreta")

}

}

function next(){

document.getElementById("c"+atual).classList.remove("active")

atual++

let prox = document.getElementById("c"+atual)

if(prox){
prox.classList.add("active")
}

}

/* CONTADOR COMPLETO */

const inicio = new Date("2021-03-12T00:00:00")

function atualizarContador(){

const agora = new Date()

let diff = agora - inicio

let segundos = Math.floor(diff / 1000)

let anos = Math.floor(segundos / 31536000)
segundos -= anos * 31536000

let dias = Math.floor(segundos / 86400)
segundos -= dias * 86400

let horas = Math.floor(segundos / 3600)
segundos -= horas * 3600

let minutos = Math.floor(segundos / 60)
segundos -= minutos * 60

document.getElementById("contadorCompleto").innerHTML =
anos + " anos<br>" +
dias + " dias<br>" +
horas + "h " +
minutos + "m " +
segundos + "s"

}

/* CONTADOR DIAS */

function atualizarDias(){

const agora = new Date()

const diff = agora - inicio

const dias = Math.floor(diff / (1000*60*60*24))

document.getElementById("contadorDias").innerHTML = dias + " dias"

}

setInterval(atualizarContador,1000)
atualizarContador()
atualizarDias()

/* MUSICA FADE IN */

function iniciarMusica(){

let audio = document.getElementById("musica")

audio.volume = 0
audio.play()

let volume = 0

let fade = setInterval(function(){

if(volume < 1){

volume += 0.02
audio.volume = volume

}else{

clearInterval(fade)

}

},200)

}

</script>

</body>
</html>
