<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nós</title>

<style>
body {
    margin: 0;
    height: 100vh;
    font-family: 'Segoe UI', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #000;
    color: white;
    text-align: center;
    overflow: hidden;
}

.container {
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(10px);
    padding: 40px;
    border-radius: 20px;
    width: 90%;
    max-width: 420px;
    box-shadow: 0 0 40px rgba(255,255,255,0.05);
}

.fade-enter {
    opacity: 0;
    transform: scale(0.95);
}

.fade-enter-active {
    opacity: 1;
    transform: scale(1);
    transition: all 1.2s ease;
}

h2 {
    font-weight: 300;
    letter-spacing: 2px;
}

input {
    padding: 12px;
    width: 100%;
    margin-top: 20px;
    border-radius: 8px;
    border: 1px solid #333;
    background: #111;
    color: white;
    text-align: center;
    font-size: 16px;
}

button {
    margin-top: 20px;
    padding: 12px;
    width: 100%;
    border-radius: 8px;
    border: none;
    background: white;
    color: black;
    font-weight: bold;
    font-size: 15px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #ccc;
}

.hidden {
    display: none;
}

#contador {
    font-size: 20px;
    margin-top: 20px;
    font-weight: 300;
    line-height: 1.6;
}

.spotify {
    margin-top: 30px;
}
</style>
</head>

<body>

<div class="container" id="login">
    <h2>🔐</h2>
    <p>Acesse.</p>
    <input type="password" id="senha" placeholder="Digite a senha">
    <button onclick="verificar()">Entrar</button>
    <p id="erro" style="color:#888;"></p>
</div>

<div class="container hidden fade-enter" id="conteudo">
    <h2>❤️</h2>

    <p>
    Desde <strong>12 de março de 2021</strong>,
    minha melhor escolha foi você.
    </p>

    <h3>Estamos juntos há:</h3>
    <div id="contador"></div>

    <p style="margin-top:25px;">
    Eu escolheria você novamente.<br>
    Todos os dias.
    </p>

    <div class="spotify">
        <iframe 
            style="border-radius:12px;"
            src="https://open.spotify.com/embed/track/3nHuKdFJZm78CoeBnDcFKe"
            width="100%" 
            height="352" 
            frameborder="0" 
            allowfullscreen="" 
            allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" 
            loading="lazy">
        </iframe>
    </div>

    <pre style="margin-top:25px; color:#888;">
function amor() {
    return "Para sempre.";
}
    </pre>
</div>

<script>
function verificar() {
    var senhaCorreta = "12032021";
    var senhaDigitada = document.getElementById("senha").value;

    if (senhaDigitada === senhaCorreta) {
        document.getElementById("login").classList.add("hidden");

        var conteudo = document.getElementById("conteudo");
        conteudo.classList.remove("hidden");

        setTimeout(() => {
            conteudo.classList.add("fade-enter-active");
        }, 50);

    } else {
        document.getElementById("erro").innerText = "Senha incorreta.";
    }
}

const dataCasamento = new Date("2021-03-12T00:00:00");

function atualizarContador() {
    const agora = new Date();
    const diferenca = agora - dataCasamento;

    const dias = Math.floor(diferenca / (1000 * 60 * 60 * 24));
    const horas = Math.floor((diferenca / (1000 * 60 * 60)) % 24);
    const minutos = Math.floor((diferenca / (1000 * 60)) % 60);
    const segundos = Math.floor((diferenca / 1000) % 60);

    document.getElementById("contador").innerHTML =
        dias + " dias<br>" +
        horas + " horas<br>" +
        minutos + " minutos<br>" +
        segundos + " segundos";
}

setInterval(atualizarContador, 1000);
atualizarContador();
</script>

</body>
</html>
