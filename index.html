<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Daniel & Stephanie</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#000;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

/* brilho suave no fundo */

body::before{
content:"";
position:absolute;
width:100vw;
height:100vh;
background:
radial-gradient(circle at 20% 30%,rgba(255,255,255,0.08),transparent 40%),
radial-gradient(circle at 80% 70%,rgba(255,255,255,0.05),transparent 40%);
animation:move 18s linear infinite;
}

@keyframes move{
0%{transform:rotate(0deg)}
100%{transform:rotate(360deg)}
}

/* card */

.card{

position:absolute;

width:85%;
max-width:420px;

height:70vh;

background:rgba(255,255,255,0.05);

backdrop-filter:blur(20px);

border-radius:30px;

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;

text-align:center;

padding:40px;

box-shadow:0 30px 60px rgba(0,0,0,.6);

opacity:0;
transform:translateY(40px) scale(.95);

transition:all .6s cubic-bezier(.16,1,.3,1);

}

.card.active{
opacity:1;
transform:translateY(0) scale(1);
}

h1{
font-size:42px;
margin:10px 0;
}

.big{
font-size:64px;
font-weight:bold;
margin:10px 0;
}

p{
font-size:20px;
opacity:.9;
}

/* botão */

button{

margin-top:30px;

padding:14px 30px;

border:none;

border-radius:40px;

background:white;

color:black;

font-weight:bold;

cursor:pointer;

transition:.2s;

}

button:hover{
transform:scale(1.05);
}

/* login */

input{

padding:12px;

border-radius:10px;

border:none;

text-align:center;

margin-top:10px;

}

</style>

</head>

<body>

<!-- LOGIN -->

<div class="card active" id="login">

<h2>Digite a senha</h2>

<input type="password" id="senha" placeholder="senha">

<button id="btnEntrar">Entrar</button>

</div>


<!-- SLIDE 1 -->

<div class="card" id="c1">

<h1>Daniel ❤️ Stephanie</h1>

<p>Nosso Love Wrapped</p>

<button onclick="next()">Começar</button>

</div>


<!-- SLIDE 2 -->

<div class="card" id="c2">

<p>Estamos juntos há</p>

<div class="big" id="contador"></div>

<button onclick="next()">Continuar</button>

</div>


<!-- SLIDE 3 -->

<div class="card" id="c3">

<div class="big">∞</div>

<p>Momentos incríveis juntos</p>

<button onclick="next()">Continuar</button>

</div>


<!-- SLIDE 4 -->

<div class="card" id="c4">

<p>Nossa música</p>

<iframe style="border-radius:12px"
src="https://open.spotify.com/embed/track/3nHuKdFJZm78CoeBnDcFKe"
width="280"
height="80"
frameborder="0">
</iframe>

<button onclick="next()">Último</button>

</div>


<!-- SLIDE FINAL -->

<div class="card" id="c5">

<h1>Stephanie ❤️</h1>

<p>Obrigado por fazer parte da minha vida desde 12/03/2021</p>

</div>


<script>

let atual = 1

document.getElementById("btnEntrar").addEventListener("click", function(){

let senha = document.getElementById("senha").value

if(senha === "12032021"){

document.getElementById("login").classList.remove("active")

document.getElementById("c1").classList.add("active")

}else{

alert("Senha incorreta")

}

})

function next(){

document.getElementById("c"+atual).classList.remove("active")

atual++

let prox = document.getElementById("c"+atual)

if(prox){
prox.classList.add("active")
}

}

/* contador */

const inicio = new Date("2021-03-12")

function atualizar(){

const agora = new Date()

const diff = agora - inicio

const dias = Math.floor(diff / (1000*60*60*24))

document.getElementById("contador").innerHTML = dias + " dias"

}

atualizar()

</script>

</body>
</html>
