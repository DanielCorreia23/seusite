<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nossa História</title>

<style>

body{
margin:0;
font-family:Arial;
background:black;
color:white;
overflow:hidden;
}

.tela{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
}

h1{
font-size:40px;
}

p{
font-size:20px;
opacity:0.8;
}

button{
margin-top:30px;
padding:12px 30px;
font-size:16px;
border:none;
border-radius:30px;
background:#ff2e63;
color:white;
cursor:pointer;
}

input{
padding:10px;
font-size:16px;
border-radius:10px;
border:none;
text-align:center;
}

.slide{
display:none;
}

.ativo{
display:flex;
}

#contador{
font-size:35px;
font-weight:bold;
margin-top:20px;
}

</style>

</head>

<body>

<!-- LOGIN -->

<div class="tela ativo" id="login">
<h1>🔒</h1>
<p>Digite a senha</p>

<input type="password" id="senha">

<button onclick="entrar()">Entrar</button>
</div>


<!-- SLIDE 1 -->

<div class="tela slide" id="s1">

<h1>Daniel ❤️ Stephanie</h1>

<p>Uma pequena retrospectiva<br>
da nossa história</p>

<button onclick="proximo()">Começar</button>

</div>


<!-- SLIDE 2 -->

<div class="tela slide" id="s2">

<h1>Estamos juntos há</h1>

<div id="contador"></div>

<button onclick="proximo()">Continuar</button>

</div>


<!-- SLIDE 3 -->

<div class="tela slide" id="s3">

<h1>Momentos</h1>

<p>
Você transformou dias comuns<br>
em memórias especiais.
</p>

<button onclick="proximo()">Continuar</button>

</div>


<!-- SLIDE 4 -->

<div class="tela slide" id="s4">

<h1>Nossa Música 🎵</h1>

<iframe style="border-radius:12px"
src="https://open.spotify.com/embed/track/3nHuKdFJZm78CoeBnDcFKe"
width="300"
height="80"
frameBorder="0"
allowfullscreen=""
allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture">
</iframe>

<button onclick="proximo()">Última</button>

</div>


<!-- SLIDE FINAL -->

<div class="tela slide" id="s5">

<h1>Stephanie ❤️</h1>

<p>
Obrigado por fazer parte<br>
da minha vida desde<br>
12/03/2021
</p>

<p>
Eu te amo.
</p>

</div>


<script>

function entrar(){

let senha = document.getElementById("senha").value

if(senha === "12032021"){

document.getElementById("login").style.display="none"

document.getElementById("s1").classList.add("ativo")

}

else{

alert("Senha incorreta")

}

}

let atual=1

function proximo(){

document.getElementById("s"+atual).classList.remove("ativo")

atual++

document.getElementById("s"+atual).classList.add("ativo")

}



const inicio = new Date("2021-03-12")

function atualizar(){

const agora = new Date()

const diff = agora - inicio

const dias = Math.floor(diff / (1000*60*60*24))

const anos = Math.floor(dias/365)

const meses = Math.floor((dias%365)/30)

const resto = dias - anos*365 - meses*30

document.getElementById("contador").innerHTML =
anos+" anos "+meses+" meses "+resto+" dias"

}

setInterval(atualizar,1000)

atualizar()

</script>

</body>
</html>
